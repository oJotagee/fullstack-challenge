name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:

jobs:
  test:
    name: Tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma clients
        run: bun run prisma:generate
        env:
          DATABASE_URL: postgresql://admin:admin@localhost:5432/postgres

      - name: Typecheck services
        run: |
          bunx tsc --noEmit -p services/games/tsconfig.json
          bunx tsc --noEmit -p services/wallets/tsconfig.json

      - name: Unit tests
        run: bun run test:unit

      - name: Frontend build
        run: bun run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: http://localhost:4001
          NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
          NEXT_PUBLIC_KEYCLOAK_REALM: crash-game
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: crash-game-client

      - name: Validate E2E test discovery
        run: bunx playwright test --list
